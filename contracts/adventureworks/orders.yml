dataset: adventureworks.orders
environment: prod
catalog: ibm-knowledge-catalog
classification: certified-data-product
criticality: high

owners:
  business_owner: finance-analytics
  technical_owner: data-platform
  governance_owner: data-governance
  escalation_channel: "#data-platform-oncall"

source:
  system: AdventureWorks
  ingestion_product: ibm-datastage
  optional_replication_product: ibm-data-replication
  pipeline: datastage/adventureworks_ingest

target:
  warehouse: ibm-db2-warehouse
  database: IBM_STACK_1_BRONZE
  schema: ADVENTUREWORKS
  table: ORDERS

freshness:
  loaded_at_field: ingestion_timestamp
  warn_after: 1 hour
  error_after: 2 hours
  severity: high

access_policy:
  warehouse: ibm-db2-warehouse
  database: IBM_STACK_1_BRONZE
  schema: ADVENTUREWORKS
  service_account: SVC_DATASTAGE_ADVENTUREWORKS
  required_privileges:
    - CONNECT_ON_DATABASE
    - CREATEIN_ON_SCHEMA
    - ALTERIN_ON_SCHEMA
    - SELECT_ON_ORDERS
    - INSERT_ON_ORDERS
    - UPDATE_ON_ORDERS
    - DELETE_ON_ORDERS
    - SELECT_ON_CUSTOMERS
    - SELECT_ON_SALES

schema:
  fields:
    - name: order_id
      type: string
      required: true
      unique: true
      description: Primary key for an order.

    - name: customer_id
      type: string
      required: true
      description: Customer identifier associated with the order.

    - name: order_status
      type: string
      required: true
      accepted_values:
        - pending
        - processing
        - shipped
        - cancelled
        - returned
      description: Current lifecycle status of the order.

    - name: order_total
      type: decimal
      precision: 18
      scale: 2
      required: true
      min_value: 0
      description: Total monetary value of the order.

    - name: order_date
      type: timestamp
      required: true
      description: Timestamp when the order was placed.

    - name: ingestion_timestamp
      type: timestamp
      required: true
      description: Timestamp when the record was loaded into Db2 Warehouse.

lineage:
  product: ibm-manta-data-lineage
  upstream:
    - system: AdventureWorks
      object: Sales.Orders
    - system: ibm-datastage
      object: datastage/adventureworks_ingest

  downstream_transformations:
    - stg_adventureworks_orders
    - stg_adventureworks_customers
    - int_sales_order_enriched
    - fct_sales
    - dim_customer

  downstream_dashboards:
    - Executive Revenue Dashboard
    - Daily Sales Performance Dashboard
    - Customer Retention Dashboard
    - Finance Close Monitoring Dashboard

observability:
  product: ibm-databand
  monitored_checks:
    - freshness_adventureworks_orders
    - row_count_anomaly_orders
    - schema_contract_adventureworks_orders
    - referential_integrity_sales_customer

governance:
  product: ibm-watsonx-governance
  certified_metric_dependencies:
    - daily_revenue
    - gross_sales
    - customer_retention_rate
  risk:
    severity: high
    business_impact: Revenue and customer reporting may be stale or incomplete.
    governance_impact: Certified business metrics may be generated from data that does not meet declared freshness expectations.
